name: smoke

# Runs on every PR and on push to main. Proves that:
#   1. The scaffold script itself parses and runs on the target Python version.
#   2. A fresh scaffold of each stack produces a project that compiles.
#   3. Known-bad inputs still produce the expected readable errors (guards fix 4/6).
#
# This workflow is the v0.1.0 "credible release candidate" check the audit flagged.
# Keep it fast: no iOS targets, no full Gradle build — assemble shared module is
# enough to catch package-rewrite and dependency-resolution regressions.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────
  # Unit tests: pytest suite for scripts/scaffold.py helpers.
  # Covers parse_git_source, placeholder_expand, apply_starter_placeholders
  # (contents + path relocation + drift detection), validate_package_prefix,
  # prune_unselected_packs, build_identifiers. Pure-Python, no toolchains.
  # ────────────────────────────────────────────────────────────────
  pytest:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install pytest
        run: python -m pip install --upgrade pip && pip install pytest
      - name: Run unit tests
        run: python -m pytest tests/ -v

  # ────────────────────────────────────────────────────────────────
  # Errors: fast (no toolchains) — prove the hardening fixes still
  # fire on known-bad inputs. If these break, drift detection, prefix
  # validation, or project_root_name sanitization has regressed.
  # ────────────────────────────────────────────────────────────────
  errors:
    name: Error-path smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Invalid --package-prefix must fail with actionable message
        run: |
          set +e
          out=$(python3 scripts/scaffold.py resolve kmp MyApp --package-prefix "com.rzv-bad" 2>&1)
          rc=$?
          echo "$out"
          [ $rc -ne 0 ] || { echo "FAIL: expected non-zero exit"; exit 1; }
          echo "$out" | grep -q "invalid --package-prefix" || { echo "FAIL: error message missing"; exit 1; }
      - name: Wild project name must fail with actionable message
        run: |
          set +e
          out=$(python3 scripts/scaffold.py resolve kmp "!!!" --package-prefix com.ci 2>&1)
          rc=$?
          echo "$out"
          [ $rc -ne 0 ] || { echo "FAIL: expected non-zero exit"; exit 1; }
          echo "$out" | grep -q "cannot slugify" || { echo "FAIL: error message missing"; exit 1; }
      - name: Python < 3.10 must be rejected
        # Simulate by running the script under 3.9 via actions/setup-python.
        run: |
          # This step runs under 3.10 for the checkout-level step; we just
          # assert the guard exists in source, as a cheap defense-in-depth.
          grep -q "requires Python 3.10 or newer" scripts/scaffold.py
          grep -q "sys.version_info < (3, 10)" scripts/scaffold.py

  # ────────────────────────────────────────────────────────────────
  # KMP: scaffold + assemble the shared module. Android SDK is needed
  # for Gradle configuration even if we skip the Android assembly.
  # iOS targets are not built (no macOS runner).
  # ────────────────────────────────────────────────────────────────
  kmp:
    name: KMP scaffold + assemble
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Scaffold KMP project (skip verify — we run a custom build below)
        run: |
          python3 scripts/scaffold.py create kmp SmokeKmp \
            --dest $RUNNER_TEMP/SmokeKmp \
            --package-prefix com.ci \
            --no-auth --no-theme \
            --skip-verify
      - name: Show top-level structure
        run: ls -la $RUNNER_TEMP/SmokeKmp
      - name: Assemble shared module (Linux-safe, catches package-rewrite regressions)
        working-directory: ${{ runner.temp }}/SmokeKmp
        run: ./gradlew --no-daemon :shared:assemble

  # ────────────────────────────────────────────────────────────────
  # Next.js: scaffold + build + runtime. `pnpm build` alone does not
  # exercise middleware/proxy for dynamic routes, so we also run the
  # production server and curl every route — that's what would have
  # caught the proxy.ts location bug before v0.1.1.
  # ────────────────────────────────────────────────────────────────
  nextjs:
    name: Next.js scaffold + build + runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Scaffold Next.js project (verify runs pnpm install + build for us)
        run: |
          python3 scripts/scaffold.py create nextjs SmokeNext \
            --dest $RUNNER_TEMP/SmokeNext \
            --auth-provider clerk \
            --theme-preset neutral
      - name: Runtime smoke — boot pnpm start, curl every route
        working-directory: ${{ runner.temp }}/SmokeNext
        run: |
          pnpm start > /tmp/next-start.log 2>&1 &
          echo $! > /tmp/next-start.pid
          # Wait up to 30s for port 3000 to accept connections
          for i in $(seq 1 30); do
            if curl -s -o /dev/null http://localhost:3000; then
              echo "server up after ${i}s"
              break
            fi
            sleep 1
          done
          set +e
          declare -A expected
          expected[/]=200
          expected[/sign-in]=200
          expected[/sign-up]=200
          expected[/dashboard]=307
          failed=0
          for route in / /sign-in /sign-up /dashboard; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:3000${route}")
            want=${expected[$route]}
            if [ "$code" = "$want" ]; then
              echo "PASS  $route → $code"
            else
              echo "FAIL  $route → got $code, expected $want"
              failed=1
            fi
          done
          kill "$(cat /tmp/next-start.pid)" 2>/dev/null || true
          if [ "$failed" -ne 0 ]; then
            echo "--- last 30 lines of server log ---"
            tail -30 /tmp/next-start.log
            exit 1
          fi
